name: Deployment
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
env:
  MONGODB_DB_NAME: Cluster0
jobs:
  test:
    environment: testing
    env:
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
      MONGODB_CLUSTER_ADDRESS: cluster0.zlxwwoa.mongodb.net
      PORT: 8080
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
      - name: Output information
        run: |
          echo "MONGDODB_USERNAME: ${{ env.MONGODB_USERNAME}}"
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |        
          echo "MONGDODB_USERNAME: ${{ env.MONGODB_USERNAME}}"
          echo "MONGDODB_DB_NAME: ${{ env.MONGODB_DB_NAME}}"
          
          
